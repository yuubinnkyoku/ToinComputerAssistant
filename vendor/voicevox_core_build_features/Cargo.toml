[package]
name = "voicevox_core_build_features"
version = "0.0.0"
edition = "2024"
publish = false
rust-version = "1.89.0"
license = "MIT"

[lib]
name = "build_features"

[features]
default = []
download = [
  "dep:anyhow",
  "dep:binstall-tar",
  "dep:camino",
  "dep:flate2",
  "dep:fs-err",
  "dep:hex",
  "dep:itertools",
  "dep:process_path",
  "dep:reqwest",
  "dep:serde",
  "dep:serde_with",
  "dep:sha2",
  "dep:toml",
]
link = ["dep:anyhow", "dep:camino", "dep:pkg-config"]

[dependencies]
anyhow = { version = "1.0.99", optional = true }
binstall-tar = { version = "0.4.42", optional = true }
camino = { version = "1.1.9", optional = true }
flate2 = { version = "1.0.34", optional = true }
fs-err = { version = "2.11.0", optional = true }
hex = { version = "0.4.3", optional = true }
itertools = { version = "0.10.5", optional = true }
pkg-config = { version = "0.3.30", optional = true }
process_path = { git = "https://github.com/VOICEVOX/process_path.git", rev = "de226a26e8e18edbdb1d6f986afe37bbbf35fbf4", optional = true }
reqwest = { version = "0.13.1", features = ["blocking"], optional = true }
serde = { version = "1.0.228", features = ["derive"], optional = true }
serde_with = { version = "3.12.0", features = ["hex"], optional = true }
sha2 = { version = "0.10.6", optional = true }
toml = { version = "0.9.11", optional = true }

[target."cfg(unix)".dependencies]
relative-path = "2.0.1"
